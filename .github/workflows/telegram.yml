name: Crypto Alerts

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Zainstaluj biblioteki
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Uruchom monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Zapisz historię
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add market_cache.json sent_links.json

          git diff --cached --quiet || git commit -m "Update cache"

          git push
